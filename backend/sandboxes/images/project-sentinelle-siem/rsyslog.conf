# SIEM NovaBank — collecteur syslog central (UDP 514).
# Sépare les messages par tag : le WAF émet tag "waf", le firewall tag
# "firewall". Chaque flux atterrit dans son propre fichier, consultable au
# terminal (grep / wc -l) pour l'analyse d'incident.

module(load="imudp")
input(type="imudp" port="514")

# Format lisible : horodatage haute résolution + IP source + tag + message.
template(name="siemline" type="string"
  string="%timegenerated:::date-rfc3339% %fromhost-ip% %syslogtag% %msg%\n")

if ($programname == "waf") or ($syslogtag contains "waf") then {
  action(type="omfile" file="/var/log/waf.log" template="siemline")
  stop
}
if ($programname == "firewall") or ($syslogtag contains "firewall") then {
  action(type="omfile" file="/var/log/firewall.log" template="siemline")
  stop
}
# Tout le reste (diagnostic).
action(type="omfile" file="/var/log/other.log" template="siemline")
