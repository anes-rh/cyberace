#!/usr/sbin/nft -f
# Baseline VOLONTAIREMENT permissive : tout le trafic transitant par le
# firewall est accepté. Objectif de l'étudiant : passer la policy à `drop`
# et n'autoriser que external->dmz (80/443) et webapp->internal (3306).
flush ruleset

table inet filter {
  chain forward {
    type filter hook forward priority 0; policy accept;
  }
}
